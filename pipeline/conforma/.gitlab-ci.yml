variables:
  # Set all of these in GitLab CI/CD Settings > Variables (mask the tokens)
  ORG_PULSE_BACKEND_URL: ""        # e.g. https://team-tracker.apps.example.com
  ORG_PULSE_API_TOKEN: ""          # Bearer token (tt_...) — set as Masked variable
  SMARTSHEET_TOKEN: ""             # Smartsheet API token — set as Masked variable
  GITLAB_CEE_TOKEN: ""             # gitlab.cee.redhat.com PAT with read_api scope — Masked
  MIN_DATE: "2025-05-22"           # Only process releases with GA date on or after this date

stages:
  - fetch-and-push

conforma-sync:
  stage: fetch-and-push
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  script:
    - pip install -r pipeline/conforma/requirements.txt -q
    - python pipeline/conforma/fetch_and_push.py
  retry:
    max: 2
    when: script_failure
